<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOEY 后台中枢系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 p-8 font-sans">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8 border-b border-gray-200 pb-4">
            <div>
                <h1 class="text-2xl font-bold tracking-widest text-[#1A1A1A]">SYSTEM CONTROL</h1>
                <p class="text-xs text-gray-400 mt-1">品牌数据与营销中枢</p>
            </div>
            <button onclick="logout()" class="px-6 py-2 bg-white border border-gray-200 text-gray-600 text-sm rounded hover:bg-gray-50 transition shadow-sm">安全退出</button>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm mb-8 border-l-4 border-red-500">
            <h2 class="text-lg font-bold mb-4">管理员安全设置 (登录账号与密码)</h2>
            <div class="flex gap-4 items-end mb-4">
                <div class="flex-1">
                    <label class="block text-xs font-bold text-gray-500 mb-1 tracking-widest">登录手机号</label>
                    <input type="text" id="adminPhoneInput" class="w-full border border-gray-200 p-2 text-sm rounded bg-gray-50 focus:bg-white focus:outline-none focus:border-black">
                </div>
                <div class="flex-1">
                    <label class="block text-xs font-bold text-gray-500 mb-1 tracking-widest">新登录密码</label>
                    <input type="text" id="adminPasswordInput" class="w-full border border-gray-200 p-2 text-sm rounded bg-gray-50 focus:bg-white focus:outline-none focus:border-black" placeholder="若不修改请留空">
                </div>
            </div>
            <div class="text-right">
                <button onclick="saveAdminAccount()" class="bg-red-600 text-white px-6 py-2 rounded text-sm tracking-widest hover:bg-red-700 transition shadow-lg">更新管理员账号</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm mb-8 border-t-4 border-[#1A1A1A]">
            <h2 class="text-lg font-bold mb-6">品牌资产与营销配置 (前台实时生效)</h2>
            
            <div class="grid grid-cols-2 gap-6 mb-6 bg-gray-50 p-4 rounded border border-gray-100">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">活动开始时间</label>
                    <input type="datetime-local" id="configStartTime" class="w-full border p-2 text-sm rounded">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">活动结束时间</label>
                    <input type="datetime-local" id="configEndTime" class="w-full border p-2 text-sm rounded">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 tracking-widest">活动大标题</label>
                    <input type="text" id="configTitle" class="w-full border border-gray-200 p-2 text-sm rounded bg-gray-50 focus:bg-white focus:outline-none focus:border-black">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 tracking-widest">活动副标题</label>
                    <input type="text" id="configSubtitle" class="w-full border border-gray-200 p-2 text-sm rounded bg-gray-50 focus:bg-white focus:outline-none focus:border-black">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-gray-500 mb-1 tracking-widest">首页品牌理念语句</label>
                    <input type="text" id="configPhilosophy" class="w-full border border-gray-200 p-2 text-sm rounded bg-gray-50 focus:bg-white focus:outline-none focus:border-black" placeholder="例如：以设计回应生活，以品质兑现承诺">
                </div>
            </div>

            <div class="flex gap-4 items-end mb-6 bg-gray-50 p-4 rounded border border-gray-100">
                <div class="flex-2 w-2/3">
                    <label class="block text-xs font-bold text-gray-500 mb-1 tracking-widest">收款弹窗话术</label>
                    <input type="text" id="configPaymentCopy" class="w-full border border-gray-200 p-2 text-sm rounded" placeholder="例如：扫码支付后联系设计师录入次数">
                </div>
                <div class="flex-1 w-1/3">
                    <label class="block text-xs font-bold text-gray-500 mb-1 tracking-widest">收款码图片链接 (URL)</label>
                    <input type="text" id="configQrCodeUrl" class="w-full border border-gray-200 p-2 text-sm rounded">
                </div>
            </div>
            
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-bold text-gray-500 tracking-widest">获取抽奖机会门槛配置</label>
                    <button onclick="addRule()" class="text-xs bg-white border border-gray-300 px-3 py-1 rounded hover:bg-gray-100 transition">添加一条门槛规则</button>
                </div>
                <div id="rulesList" class="space-y-2"></div>
            </div>

            <div class="text-right">
                <button onclick="saveConfig()" class="bg-[#1A1A1A] text-white px-8 py-3 rounded text-sm tracking-widest hover:bg-black transition shadow-lg">保存所有品牌营销配置</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100 mt-8 border-t-4 border-[#8C6A4F] mb-8">
            <h2 class="text-lg font-bold mb-2">中奖客户跟进 (Sales CRM)</h2>
            <p class="text-xs text-gray-400 mb-6">前台用户中奖后登记的个人信息将自动汇集于此，销售顾问可实时跟进流转。</p>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm whitespace-nowrap">
                    <thead class="bg-gray-50 text-gray-500 text-xs">
                        <tr>
                            <th class="p-3">登记时间</th>
                            <th class="p-3">客户姓名</th>
                            <th class="p-3">联系电话</th>
                            <th class="p-3">所在城市</th>
                            <th class="p-3 text-[#1A1A1A]">所获奖品</th>
                            <th class="p-3">需求 (阶段/户型)</th>
                            <th class="p-3">定制预算</th>
                            <th class="p-3 text-right">当前跟进状态</th>
                        </tr>
                    </thead>
                    <tbody id="leadsList" class="divide-y divide-gray-100">
                        <!-- 由JS渲染销售线索 -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-100">
                <h2 class="text-lg font-bold mb-6">客户资产池与裂变数据</h2>
                <div id="usersList" class="space-y-3 max-h-[500px] overflow-y-auto pr-2"></div>
                <div class="mt-6 text-right">
                    <button onclick="saveUsers()" class="bg-[#8C6A4F] text-white px-6 py-2 rounded text-sm hover:bg-[#72553f] transition">保存客户次数</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        const headers = { 'Authorization': token, 'Content-Type': 'application/json' };
        let currentData = { prizes: [], users: [] };
        let currentRules = [];

        async function init() {
            const cfgRes = await fetch('/api/config');
            const config = await cfgRes.json();
            
            if(config.startTime) {
                const st = new Date(config.startTime);
                st.setMinutes(st.getMinutes() - st.getTimezoneOffset());
                document.getElementById('configStartTime').value = st.toISOString().slice(0,16);
            }
            if(config.endTime) {
                const et = new Date(config.endTime);
                et.setMinutes(et.getMinutes() - et.getTimezoneOffset());
                document.getElementById('configEndTime').value = et.toISOString().slice(0,16);
            }

            document.getElementById('configTitle').value = config.title;
            document.getElementById('configSubtitle').value = config.subtitle;
            document.getElementById('configPhilosophy').value = config.brandPhilosophy || "";
            document.getElementById('configPaymentCopy').value = config.paymentCopy || "";
            document.getElementById('configQrCodeUrl').value = config.qrCodeUrl || "";
            currentRules = config.rules || [];
            renderRules();

            const res = await fetch('/api/admin/data', { headers });
            if (res.status === 403) { alert('越权访问，即将退出'); return logout(); }
            currentData = await res.json();
            
            document.getElementById('adminPhoneInput').value = currentData.admin.phone;
            
            renderPrizes();
            renderUsers();
            loadLeads();
        }

        function renderRules() {
            document.getElementById('rulesList').innerHTML = currentRules.map((r, i) => `
                <div class="flex gap-2 items-center bg-gray-50 p-2 rounded border border-gray-100">
                    <input type="text" value="${r.condition}" onchange="currentRules[${i}].condition=this.value" class="flex-1 border border-gray-200 p-2 text-sm rounded bg-white" placeholder="条件">
                    <input type="text" value="${r.value}" onchange="currentRules[${i}].value=this.value" class="flex-1 border border-gray-200 p-2 text-sm rounded bg-white" placeholder="金额">
                    <input type="text" value="${r.reward}" onchange="currentRules[${i}].reward=this.value" class="w-24 border border-gray-200 p-2 text-sm rounded bg-white" placeholder="奖励">
                    <button onclick="currentRules.splice(${i}, 1); renderRules()" class="text-red-400 hover:text-red-600 text-xs px-2">删除</button>
                </div>
            `).join('');
        }
        function addRule() { currentRules.push({ condition: "新门槛", value: "0元", reward: "1次" }); renderRules(); }

        async function saveConfig() {
            const payload = {
                title: document.getElementById('configTitle').value,
                subtitle: document.getElementById('configSubtitle').value,
                brandPhilosophy: document.getElementById('configPhilosophy').value,
                paymentCopy: document.getElementById('configPaymentCopy').value,
                qrCodeUrl: document.getElementById('configQrCodeUrl').value,
                rules: currentRules,
                startTime: document.getElementById('configStartTime').value || new Date(),
                endTime: document.getElementById('configEndTime').value || new Date()
            };
            await fetch('/api/config', { method: 'POST', headers, body: JSON.stringify(payload) });
            alert('品牌营销配置已保存！首页已实时更新。');
        }

        function renderPrizes() {
            document.getElementById('prizesList').innerHTML = currentData.prizes.map((p, i) => `
                <div class="flex gap-3 items-center bg-gray-50 p-3 rounded border border-gray-100 shadow-sm">
                    <input type="text" value="${p.name}" onchange="currentData.prizes[${i}].name=this.value" class="flex-1 border border-gray-200 p-2 text-sm rounded focus:border-[#8C6A4F] focus:outline-none">
                    <input type="number" value="${p.weight}" onchange="currentData.prizes[${i}].weight=Number(this.value)" class="w-20 border border-gray-200 p-2 text-sm rounded focus:border-[#8C6A4F] focus:outline-none" title="概率权重">
                    <button onclick="currentData.prizes.splice(${i}, 1); renderPrizes()" class="text-gray-400 hover:text-red-500 text-xs transition">删除</button>
                </div>
            `).join('');
        }
        function addPrize() { currentData.prizes.push({ name: "NEW GIFT - 新奖品", weight: 10 }); renderPrizes(); }
        async function savePrizes() {
            await fetch('/api/admin/prizes', { method: 'POST', headers, body: JSON.stringify(currentData.prizes) });
            alert('奖品陈列库已同步至前台！');
        }

        function renderUsers() {
            document.getElementById('usersList').innerHTML = currentData.users.map((u, i) => `
                <div class="flex flex-col gap-2 bg-white p-4 rounded border border-gray-100 shadow-sm">
                    <div class="flex justify-between items-center">
                        <div class="font-bold text-sm tracking-wider">${u.phone}</div>
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-500">操作次数:</span>
                            <input type="number" value="${u.chances}" onchange="currentData.users[${i}].chances=Number(this.value)" class="w-16 border border-gray-200 p-1 text-sm rounded text-center focus:border-[#8C6A4F] focus:outline-none">
                        </div>
                    </div>
                    <div class="text-[10px] text-gray-400 mt-1 flex justify-between border-t pt-2 border-gray-50 items-center">
                        <span>${u.rewards.length ? '已送出: ' + u.rewards.map(r=>r.name.includes('-') ? r.name.split('-')[1].trim() : r.name).join('，') : '暂未获得礼遇'}</span>
                        <span class="text-[#8C6A4F] font-bold bg-[#E6D5B8]/20 px-2 py-1 rounded">分享: ${u.shareCount || 0} | 拉新: ${u.inviteCount || 0}</span>
                    </div>
                </div>
            `).join('');
        }

        async function saveUsers() {
            await fetch('/api/admin/users', { method: 'POST', headers, body: JSON.stringify(currentData.users) });
            alert('客户资产池状态更新成功！');
        }

        async function saveAdminAccount() {
            const phone = document.getElementById('adminPhoneInput').value;
            const password = document.getElementById('adminPasswordInput').value;
            if(!phone) return alert('手机号不能为空');
            
            await fetch('/api/admin/account', {
                method: 'POST',
                headers,
                body: JSON.stringify({ phone, password })
            });
            alert('管理员账号更新成功！请记住您的新账号密码。');
            if(phone !== localStorage.getItem('token')) {
                localStorage.setItem('token', phone); 
            }
        }

        async function loadLeads() {
            const res = await fetch('/api/admin/leads', { headers });
            const leads = await res.json();
            
            document.getElementById('leadsList').innerHTML = leads.map(lead => `
                <tr class="hover:bg-gray-50 transition">
                    <td class="p-3 text-gray-400">${lead.claimTime.split(' ')[0]}</td>
                    <td class="p-3 font-bold">${lead.userName}</td>
                    <td class="p-3 font-medium">${lead.userPhone}</td>
                    <td class="p-3">${lead.city}</td>
                    <td class="p-3 font-serif text-[#8C6A4F] font-bold">${lead.prizeName.includes('-') ? lead.prizeName.split('-')[1].trim() : lead.prizeName}</td>
                    <td class="p-3"><span class="bg-gray-100 px-2 py-1 rounded text-xs">${lead.stage} / ${lead.layout}</span></td>
                    <td class="p-3">${lead.budget}</td>
                    <td class="p-3 text-right">
                        <select onchange="updateLeadStatus('${lead._id}', this.value)" class="text-xs border border-gray-200 p-1 rounded ${lead.status==='已成交'?'bg-green-50 text-green-700':(lead.status==='新客户'?'bg-red-50 text-red-600':'bg-white')}">
                            <option value="新客户" ${lead.status==='新客户'?'selected':''}>新客户</option>
                            <option value="已联系" ${lead.status==='已联系'?'selected':''}>已联系</option>
                            <option value="已预约" ${lead.status==='已预约'?'selected':''}>已预约</option>
                            <option value="已成交" ${lead.status==='已成交'?'selected':''}>已成交</option>
                            <option value="无效" ${lead.status==='无效'?'selected':''}>无效</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        }

        async function updateLeadStatus(id, status) {
            await fetch('/api/admin/leads/status', {
                method: 'POST',
                headers,
                body: JSON.stringify({ id, status })
            });
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }
        
        init();
    </script>
</body>
</html>
