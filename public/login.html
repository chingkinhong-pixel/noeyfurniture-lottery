<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 抽奖系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F5F5F0] min-h-screen flex items-center justify-center font-sans">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md border border-gray-100 relative">
        <div class="text-center mb-8">
            <h1 id="pageTitle" class="text-3xl font-bold text-gray-900 tracking-wider">加载中...</h1>
            <p id="pageSubtitle" class="text-gray-500 mt-2 text-sm">...</p>
        </div>

        <!-- 普通用户登录 (默认显示) -->
        <div id="userForm">
            <input type="text" id="userPhone" placeholder="请输入您的手机号参与抽奖" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#8B7355] mb-6">
            <button onclick="login(false)" class="w-full bg-[#2C2C2C] text-white py-3 rounded-lg hover:bg-black transition font-medium tracking-widest">立即进入</button>
        </div>

        <!-- 管理员登录 (默认隐藏) -->
        <div id="adminForm" class="hidden">
            <input type="text" id="adminPhone" placeholder="管理员手机号" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-gray-400 mb-4">
            <input type="password" id="adminPwd" placeholder="管理员密码" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:border-gray-400 mb-6">
            <button onclick="login(true)" class="w-full bg-[#8B7355] text-white py-3 rounded-lg hover:bg-[#6e5a42] transition font-medium tracking-widest">进入后台</button>
        </div>

        <div class="mt-6 text-right">
            <span id="toggleBtn" onclick="toggleForm()" class="text-xs text-gray-400 cursor-pointer hover:text-gray-600 transition">管理入口</span>
        </div>
    </div>

    <script>
        let isAdminView = false;

        // 获取动态配置
        fetch('/api/config').then(res => res.json()).then(data => {
            document.getElementById('pageTitle').innerText = data.title;
            document.getElementById('pageSubtitle').innerText = data.subtitle;
            document.title = data.title + " - 登录";
        });

        function toggleForm() {
            isAdminView = !isAdminView;
            document.getElementById('userForm').classList.toggle('hidden');
            document.getElementById('adminForm').classList.toggle('hidden');
            document.getElementById('toggleBtn').innerText = isAdminView ? "返回普通登录" : "管理入口";
        }

        async function login(isAdminLogin) {
            const phone = isAdminLogin ? document.getElementById('adminPhone').value : document.getElementById('userPhone').value;
            const password = isAdminLogin ? document.getElementById('adminPwd').value : "";
            
            if (!phone) return alert('请输入手机号');

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone, password, isAdminLogin })
            });
            const data = await res.json();

            if (data.error) return alert(data.error);

            localStorage.setItem('token', data.token);
            window.location.href = data.role === 'admin' ? '/admin.html' : '/index.html';
        }
    </script>
</body>
</html>
