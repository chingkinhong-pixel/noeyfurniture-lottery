<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOEY - 客户跟进 CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #F9F9F9; font-family: -apple-system, sans-serif; color: #1A1A1A; }
        .nav-link { color: #71717A; padding-bottom: 12px; font-size: 14px; letter-spacing: 0.1em; transition: all 0.3s; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 6px; }
        .nav-link:hover { color: #1A1A1A; }
        .nav-link.active { color: #1A1A1A; font-weight: 600; border-bottom: 2px solid #1A1A1A; }
        .table-header { font-size: 11px; font-weight: 700; color: #71717A; border-bottom: 1px solid #EEEEEE; padding: 16px; background-color: #FAFAFA; text-align: left; white-space: nowrap;}
        .table-cell { font-size: 13px; padding: 16px; border-bottom: 1px solid #FAFAFA; vertical-align: top;}
        .table-row { transition: background-color 0.2s; background: white;}
        .table-row:hover { background-color: #FAFAFA; }
        
        /* NOEY 极简标签颜色 */
        .tag-新客户 { background: #F4F4F5; color: #52525B; border: 1px solid #E4E4E7; }
        .tag-待联系 { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
        .tag-已联系 { background: #E0F2FE; color: #0369A1; border: 1px solid #BAE6FD; }
        .tag-已预约设计 { background: #F3E8FF; color: #6B21A8; border: 1px solid #E9D5FF; }
        .tag-已成交 { background: #DCFCE7; color: #166534; border: 1px solid #BBF7D0; }
        .tag-暂无需求 { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
    </style>
</head>
<body class="min-h-screen pb-12">
    
    <header class="bg-white border-b border-[#EEEEEE] sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1400px] mx-auto px-6 pt-6 flex justify-between items-end">
            <div>
                <h1 class="text-xl font-bold tracking-widest mb-6 flex items-center gap-2">
                    <i class="ph-fill ph-leaf text-[#8C6A4F]"></i> NOEY CRM
                </h1>
                <nav class="flex space-x-8">
                    <a href="admin.html" class="nav-link"><i class="ph ph-faders text-lg"></i> 基础设置与资产</a>
                    <a href="customer-management.html" class="nav-link active"><i class="ph ph-users text-lg"></i> 客户跟进 CRM</a>
                    <a href="reward-records.html" class="nav-link"><i class="ph ph-gift text-lg"></i> 中奖流水库</a>
                </nav>
            </div>
            <button onclick="logout()" class="mb-6 text-xs text-gray-500 hover:text-black tracking-widest uppercase transition flex items-center gap-1">
                <i class="ph ph-sign-out"></i> 退出
            </button>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto px-6 py-8">
        <div class="bg-white border border-[#EEEEEE] rounded-lg shadow-sm overflow-hidden">
            
            <div class="flex justify-between items-center p-6 border-b border-gray-100">
                <div class="flex items-center gap-4">
                    <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">
                        独立客户档案
                    </h2>
                    <div class="relative ml-4">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="搜索姓名或手机号..." class="pl-9 pr-4 py-2 text-xs border border-gray-200 rounded bg-gray-50 focus:bg-white focus:outline-none focus:border-black transition w-64">
                    </div>
                </div>
                <button onclick="loadCustomers()" class="text-xs text-gray-600 bg-white hover:bg-gray-50 border border-gray-200 px-4 py-2 rounded transition shadow-sm flex items-center gap-1">
                    <i class="ph ph-arrows-clockwise text-base"></i> 刷新
                </button>
            </div>
            
            <div class="overflow-x-auto min-h-[500px]">
                <table class="w-full text-left border-collapse min-w-[1100px]">
                    <thead>
                        <tr>
                            <th class="table-header w-48">客户基础信息</th>
                            <th class="table-header w-32">来源</th>
                            <th class="table-header w-56">消费意向</th>
                            <th class="table-header w-32">需求类型</th>
                            <th class="table-header w-40">跟进状态</th>
                            <th class="table-header">系统备注</th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody">
                        <!-- JS 渲染区 -->
                    </tbody>
                </table>
            </div>

            <!-- 分页栏 -->
            <div class="p-4 border-t border-gray-100 bg-gray-50 flex justify-between items-center text-sm">
                <div class="text-gray-500" id="pageInfo"></div>
                <div class="flex gap-2" id="paginationControls"></div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        const headers = { 'Authorization': token, 'Content-Type': 'application/json' };
        
        const statusOptions = ['新客户', '待联系', '已联系', '已预约设计', '已成交', '暂无需求'];
        const needTypeOptions = ['未确定', '全屋定制', '柜类定制', '单品家具', '设计方案'];

        let allCustomers = [];
        let searchQuery = "";
        let currentPage = 1;
        const pageSize = 15;

        async function loadCustomers() {
            document.getElementById('customerTableBody').innerHTML = `<tr><td colspan="6" class="text-center py-16 text-gray-400 text-sm">加载中...</td></tr>`;
            try {
                const res = await fetch('/api/admin/customers', { headers });
                if (res.status === 403) return logout();
                allCustomers = await res.json();
                renderCustomers();
            } catch(e) { console.error(e); }
        }

        function handleSearch(query) {
            searchQuery = query.trim().toLowerCase();
            currentPage = 1; // 搜索时重置页码
            renderCustomers();
        }

        function renderCustomers() {
            // 1. 过滤
            let filtered = allCustomers;
            if (searchQuery) {
                filtered = filtered.filter(c => 
                    (c.name && c.name.toLowerCase().includes(searchQuery)) || 
                    (c.phone && c.phone.includes(searchQuery))
                );
            }

            // 2. 分页
            const total = filtered.length;
            const totalPages = Math.ceil(total / pageSize) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            
            const start = (currentPage - 1) * pageSize;
            const paginated = filtered.slice(start, start + pageSize);

            // 3. 渲染列表
            const tbody = document.getElementById('customerTableBody');
            if(paginated.length === 0) {
                 tbody.innerHTML = `<tr><td colspan="6" class="text-center py-16 text-gray-400 text-sm">未找到匹配的客户</td></tr>`;
            } else {
                tbody.innerHTML = paginated.map(c => `
                    <tr class="table-row">
                        <td class="table-cell">
                            <div class="font-bold text-gray-800 text-sm mb-1">${c.name}</div>
                            <div class="text-[11px] text-[#8C6A4F] font-mono mb-1">${c.phone}</div>
                            <div class="text-[10px] text-gray-400">${c.registerTime.split(' ')[0]}</div>
                        </td>
                        <td class="table-cell">
                            <span class="text-[11px] text-gray-500 bg-gray-100 px-2 py-1 rounded border border-gray-200">${c.source}</span>
                        </td>
                        <td class="table-cell">
                            <div class="flex flex-col gap-1.5 text-[11px]">
                                <span class="text-gray-600"><span class="text-gray-400 w-8 inline-block">阶段:</span> ${c.stage}</span>
                                <span class="text-[#8C6A4F] font-bold"><span class="text-gray-400 w-8 inline-block font-normal">预算:</span> ${c.budget}</span>
                                <span class="text-gray-600"><span class="text-gray-400 w-8 inline-block">户型:</span> ${c.layout}</span>
                            </div>
                        </td>
                        <td class="table-cell">
                            <select onchange="updateCustomer('${c.phone}', 'needType', this.value)" class="text-xs border border-gray-200 rounded p-1.5 focus:outline-none focus:border-black bg-gray-50 hover:bg-white transition w-full">
                                ${needTypeOptions.map(opt => `<option value="${opt}" ${c.needType === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                            </select>
                        </td>
                        <td class="table-cell">
                            <select onchange="updateCustomer('${c.phone}', 'followUpStatus', this.value)" class="text-xs font-bold rounded px-2 py-1.5 focus:outline-none cursor-pointer tag-${c.followUpStatus} w-full text-center">
                                ${statusOptions.map(opt => `<option value="${opt}" ${c.followUpStatus === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                            </select>
                        </td>
                        <td class="table-cell">
                            <textarea onblur="updateCustomer('${c.phone}', 'remark', this.value)" class="w-full text-xs border border-gray-200 rounded p-2 h-16 resize-none focus:outline-none focus:border-black bg-gray-50 focus:bg-white transition" placeholder="填写跟进记录...">${c.remark}</textarea>
                        </td>
                    </tr>
                `).join('');
            }

            // 4. 渲染分页控件
            document.getElementById('pageInfo').innerText = `共 ${total} 条数据，当前第 ${currentPage} 页 / 共 ${totalPages} 页`;
            document.getElementById('paginationControls').innerHTML = `
                <button onclick="currentPage--; renderCustomers()" ${currentPage === 1 ? 'disabled' : ''} class="px-3 py-1 bg-white border border-gray-200 rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50 transition">上一页</button>
                <button onclick="currentPage++; renderCustomers()" ${currentPage === totalPages ? 'disabled' : ''} class="px-3 py-1 bg-white border border-gray-200 rounded text-gray-600 hover:bg-gray-50 disabled:opacity-50 transition">下一页</button>
            `;
        }

        async function updateCustomer(phone, field, value) {
            const body = {}; body[field] = value;
            try {
                await fetch(`/api/admin/customers/${phone}`, { method: 'PUT', headers, body: JSON.stringify(body) });
                
                // 本地数据同步更新，防止翻页后数据回退
                const idx = allCustomers.findIndex(c => c.phone === phone);
                if(idx > -1) allCustomers[idx][field] = value;

                if(field === 'followUpStatus') renderCustomers(); // 刷新颜色
            } catch(e) { alert('更新失败'); }
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }
        
        loadCustomers();
    </script>
</body>
</html>
