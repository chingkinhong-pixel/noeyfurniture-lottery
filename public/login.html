<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 诺一家具 NOEY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .serif-font { font-family: 'Noto Serif SC', serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<!-- 引入高级家居背景图，增加暗色遮罩以突出中间的登录框 -->
<body class="min-h-screen flex items-center justify-center font-sans relative" style="background-image: url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-position: center;">
    
    <!-- 全屏暗化遮罩 -->
    <div class="absolute inset-0 bg-black/40"></div>

    <!-- 极度隐蔽的管理员入口 -->
    <div onclick="toggleForm()" class="absolute bottom-4 right-4 text-[10px] text-white/20 hover:text-white/80 cursor-pointer transition-colors z-50 tracking-widest">
        Admin.
    </div>

    <!-- 登录面板 -->
    <div class="glass-panel p-10 rounded-2xl shadow-2xl w-full max-w-md relative z-20 mx-4 transform transition-all">
        <div class="text-center mb-10">
            <!-- 移除了 onerror 代码 -->
            <img id="loginLogo" src="" alt="NOEY" class="h-8 mx-auto mb-6 object-contain hidden">
            <h1 id="pageTitle" class="text-2xl font-bold text-[#1A1A1A] tracking-wider serif-font">加载中...</h1>
            <p id="pageSubtitle" class="text-[#8C6A4F] mt-3 text-sm tracking-widest">...</p>
        </div>

        <!-- 普通用户登录 (默认显示) -->
        <div id="userForm">
            <div class="relative mb-8">
                <input type="text" id="userPhone" placeholder="请输入您的手机号" class="w-full px-4 py-4 bg-white/50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#8C6A4F] focus:border-transparent transition-all placeholder-gray-400 text-gray-900">
            </div>
            <button onclick="login(false)" class="w-full bg-[#1A1A1A] text-white py-4 rounded-lg hover:bg-[#8C6A4F] transition-colors duration-300 font-medium tracking-widest text-sm uppercase">
                立即开启专属礼遇
            </button>
        </div>

        <!-- 管理员登录 (默认隐藏) -->
        <div id="adminForm" class="hidden">
            <div class="text-xs text-center text-gray-500 mb-6 tracking-widest uppercase">System Management</div>
            <input type="text" id="adminPhone" placeholder="管理员账号" class="w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black mb-4 transition-all">
            <input type="password" id="adminPwd" placeholder="管理密码" class="w-full px-4 py-3 bg-white/50 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-black mb-8 transition-all">
            <button onclick="login(true)" class="w-full bg-[#1A1A1A] text-white py-4 rounded-lg hover:bg-black transition-colors duration-300 font-medium tracking-widest text-sm uppercase shadow-lg">
                进入中枢
            </button>
        </div>
    </div>

    <script>
        let isAdminView = false;

        // 获取动态配置及 Logo
        fetch('/api/config').then(res => res.json()).then(data => {
            document.getElementById('pageTitle').innerText = data.title || 'NOEY 诺一家具';
            document.getElementById('pageSubtitle').innerText = data.subtitle || '为每一位客户准备专属定制礼物';
            document.title = (data.title || 'NOEY') + " - 品牌认证";
            
            // ==========================================
            // 🎨 硬编码：绝对兜底的彩色 Logo 链接
            // ==========================================
            const MY_LOGO_COLOR = 'https://i.hd-r.cn/0f8d5bee-a893-4a9d-acd6-d8a9c5b4357f.png';
            
            const logoEl = document.getElementById('loginLogo');
            logoEl.src = data.logoColorUrl || MY_LOGO_COLOR;
            logoEl.classList.remove('hidden');
        });

        function toggleForm() {
            isAdminView = !isAdminView;
            document.getElementById('userForm').classList.toggle('hidden');
            document.getElementById('adminForm').classList.toggle('hidden');
        }

        async function login(isAdminLogin) {
            const phone = isAdminLogin ? document.getElementById('adminPhone').value : document.getElementById('userPhone').value;
            const password = isAdminLogin ? document.getElementById('adminPwd').value : "";
            
            if (!phone) return alert('请输入手机号');

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "验证中...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password, isAdminLogin })
                });
                const data = await res.json();

                if (data.error) throw new Error(data.error);

                localStorage.setItem('token', data.token);
                window.location.href = data.role === 'admin' ? '/admin.html' : '/index.html';
            } catch (err) {
                alert(err.message);
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
