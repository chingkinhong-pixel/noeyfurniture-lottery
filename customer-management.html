<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOEY - 客户跟进管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { background-color: #F4F4F5; font-family: -apple-system, sans-serif; color: #1A1A1A; }
        .nav-link { color: #71717A; padding-bottom: 12px; font-size: 14px; letter-spacing: 0.1em; transition: all 0.3s; border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 6px; }
        .nav-link:hover { color: #1A1A1A; }
        .nav-link.active { color: #1A1A1A; font-weight: 600; border-bottom: 2px solid #1A1A1A; }
        .table-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #71717A; border-bottom: 2px solid #E4E4E7; padding: 12px 16px; background-color: #FAFAFA;}
        .table-cell { font-size: 13px; padding: 16px; border-bottom: 1px solid #F4F4F5; vertical-align: top;}
        .table-row { transition: background-color 0.2s; }
        .table-row:hover { background-color: #FAFAFA; }
        
        /* 优化后的 NOEY 极简状态颜色体系 */
        .tag-新客户 { background: #F3F4F6; color: #4B5563; border: 1px solid #E5E7EB; }
        .tag-待联系 { background: #FFF7ED; color: #C2410C; border: 1px solid #FFEDD5; }
        .tag-已联系 { background: #EFF6FF; color: #1D4ED8; border: 1px solid #DBEAFE; }
        .tag-已预约设计 { background: #FAF5FF; color: #7E22CE; border: 1px solid #F3E8FF; }
        .tag-已成交 { background: #F0FDF4; color: #15803D; border: 1px solid #DCFCE7; }
        .tag-暂无需求 { background: #FEF2F2; color: #B91C1C; border: 1px solid #FEE2E2; }
    </style>
</head>
<body class="min-h-screen pb-12">
    
    <header class="bg-white border-b border-[#EBEBEB] sticky top-0 z-50 shadow-sm">
        <div class="max-w-[1400px] mx-auto px-6 pt-6 flex justify-between items-end">
            <div>
                <h1 class="text-xl font-bold tracking-widest mb-6 flex items-center gap-2">
                    <i class="ph-fill ph-leaf text-[#8C6A4F]"></i> NOEY CRM
                </h1>
                <nav class="flex space-x-8">
                    <a href="admin.html" class="nav-link"><i class="ph ph-faders text-lg"></i> 基础设置与资产</a>
                    <a href="customer-management.html" class="nav-link active"><i class="ph ph-users text-lg"></i> 客户跟进 CRM</a>
                    <a href="reward-records.html" class="nav-link"><i class="ph ph-gift text-lg"></i> 中奖流水库</a>
                </nav>
            </div>
            <button onclick="logout()" class="mb-6 text-xs text-gray-400 hover:text-black tracking-widest uppercase transition flex items-center gap-1">
                <i class="ph ph-sign-out text-lg"></i> 退出
            </button>
        </div>
    </header>

    <div class="max-w-[1400px] mx-auto px-6 py-8">
        <div class="bg-white border border-[#E4E4E7] rounded-xl shadow-sm overflow-hidden">
            <div class="flex justify-between items-center p-6 border-b border-gray-100 bg-white">
                <div>
                    <h2 class="text-base font-bold tracking-widest uppercase flex items-center gap-2 text-gray-800">
                        <i class="ph-fill ph-users-three text-[#8C6A4F]"></i> 独立客户档案总览
                    </h2>
                    <p class="text-[11px] text-gray-400 mt-1">系统会自动抓取并归档通过营销活动引入的潜在客户信息。</p>
                </div>
                <button onclick="loadCustomers()" class="text-xs text-gray-600 font-bold bg-white hover:bg-gray-50 border border-gray-200 px-4 py-2 rounded-lg transition shadow-sm flex items-center gap-2">
                    <i class="ph ph-arrows-clockwise text-base"></i> 刷新数据
                </button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1200px]">
                    <thead>
                        <tr>
                            <th class="table-header w-48"><div class="flex items-center gap-1"><i class="ph ph-identification-card"></i> 客户基础信息</div></th>
                            <th class="table-header w-32"><div class="flex items-center gap-1"><i class="ph ph-share-network"></i> 来源</div></th>
                            <th class="table-header w-56"><div class="flex items-center gap-1"><i class="ph ph-house-line"></i> 消费意向 (阶段/预算/户型)</div></th>
                            <th class="table-header w-32"><div class="flex items-center gap-1"><i class="ph ph-shopping-cart"></i> 需求类型</div></th>
                            <th class="table-header w-40"><div class="flex items-center gap-1"><i class="ph ph-flag"></i> 跟进状态</div></th>
                            <th class="table-header"><div class="flex items-center gap-1"><i class="ph ph-notepad"></i> 系统备注 (自动保存)</div></th>
                        </tr>
                    </thead>
                    <tbody id="customerTableBody">
                        <!-- JS 渲染区 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        const headers = { 'Authorization': token, 'Content-Type': 'application/json' };
        
        const statusOptions = ['新客户', '待联系', '已联系', '已预约设计', '已成交', '暂无需求'];
        const needTypeOptions = ['未确定', '全屋定制', '柜类定制', '单品家具', '设计方案'];

        async function loadCustomers() {
            document.getElementById('customerTableBody').innerHTML = `<tr><td colspan="6" class="text-center py-16 text-gray-400 text-sm flex justify-center items-center gap-2"><i class="ph ph-spinner animate-spin text-xl"></i> 数据加载清洗中...</td></tr>`;
            try {
                const res = await fetch('/api/admin/customers', { headers });
                if (res.status === 403) return logout();
                const customers = await res.json();
                renderCustomers(customers);
            } catch(e) { console.error(e); }
        }

        function renderCustomers(customers) {
            if(customers.length === 0) {
                 document.getElementById('customerTableBody').innerHTML = `<tr><td colspan="6" class="text-center py-16 text-gray-400 text-sm"><i class="ph ph-folder-open text-4xl mb-2"></i><br>暂无客户档案</td></tr>`;
                 return;
            }

            document.getElementById('customerTableBody').innerHTML = customers.map(c => `
                <tr class="table-row">
                    <td class="table-cell">
                        <div class="font-bold text-gray-800 text-sm">${c.name}</div>
                        <div class="text-xs text-[#8C6A4F] font-mono my-1.5 font-medium">${c.phone}</div>
                        <div class="text-[10px] text-gray-400 flex items-center gap-1"><i class="ph ph-clock text-xs"></i> ${c.registerTime.split(' ')[0]}</div>
                    </td>
                    <td class="table-cell">
                        <span class="text-xs text-gray-500 bg-gray-100 px-2 py-1 rounded-md">${c.source}</span>
                    </td>
                    <td class="table-cell">
                        <div class="flex flex-wrap gap-2 text-[11px] text-gray-600">
                            <span class="bg-[#F8F8F9] px-2.5 py-1 rounded-md border border-gray-200 shadow-sm">${c.stage}</span>
                            <span class="bg-[#F8F8F9] px-2.5 py-1 rounded-md border border-gray-200 shadow-sm text-[#8C6A4F] font-bold">${c.budget}</span>
                            <span class="bg-[#F8F8F9] px-2.5 py-1 rounded-md border border-gray-200 shadow-sm">${c.layout}</span>
                        </div>
                    </td>
                    <td class="table-cell">
                        <select onchange="updateCustomer('${c.phone}', 'needType', this.value)" class="text-xs border border-gray-200 rounded-md p-1.5 focus:outline-none focus:border-[#8C6A4F] focus:ring-1 focus:ring-[#8C6A4F] bg-white cursor-pointer hover:border-gray-300 transition w-full">
                            ${needTypeOptions.map(opt => `<option value="${opt}" ${c.needType === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </td>
                    <td class="table-cell">
                        <select onchange="updateCustomer('${c.phone}', 'followUpStatus', this.value)" class="text-xs font-bold rounded-md px-3 py-1.5 focus:outline-none appearance-none cursor-pointer tag-${c.followUpStatus} shadow-sm w-full text-center hover:opacity-90 transition">
                            ${statusOptions.map(opt => `<option value="${opt}" ${c.followUpStatus === opt ? 'selected' : ''}>${opt}</option>`).join('')}
                        </select>
                    </td>
                    <td class="table-cell relative">
                        <textarea onblur="updateCustomer('${c.phone}', 'remark', this.value)" class="w-full text-xs border border-gray-200 rounded-md p-2.5 h-16 resize-none focus:outline-none focus:border-[#8C6A4F] focus:ring-1 focus:ring-[#8C6A4F] bg-[#F8F8F9] focus:bg-white transition leading-relaxed shadow-inner placeholder-gray-300" placeholder="填写跟进记录...">${c.remark}</textarea>
                    </td>
                </tr>
            `).join('');
        }

        async function updateCustomer(phone, field, value) {
            const body = {}; body[field] = value;
            try {
                await fetch(`/api/admin/customers/${phone}`, { method: 'PUT', headers, body: JSON.stringify(body) });
                // 如果是修改状态，局部刷新以应用颜色类
                if(field === 'followUpStatus') loadCustomers();
            } catch(e) { alert('更新失败，请检查网络'); }
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }
        
        loadCustomers();
    </script>
</body>
</html>
