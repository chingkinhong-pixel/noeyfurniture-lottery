        /* 分享海报逻辑 (新增) */
        function showShareModal(prizeName) {
            const modal = document.getElementById('shareModal');
            modal.classList.remove('hidden');
            void modal.offsetWidth; 
            modal.classList.remove('opacity-0');
            document.getElementById('shareModalContent').classList.remove('scale-95');

            // 填充海报数据
            document.getElementById('posterPhone').innerText = rawUserPhone.replace(/(\d{3})\d{4}(\d{4})/, "$1****$2");
            document.getElementById('posterPrize').innerText = prizeName;

            // 动态生成专属邀请二维码
            const inviteLink = window.location.origin + '/login.html?inviter=' + rawUserPhone;
            document.getElementById('posterQrCode').src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(inviteLink);

            // 重置UI
            document.getElementById('btnShareReward').classList.add('hidden');
            document.getElementById('shareTip').innerText = '正在为您渲染专属海报...';
            document.getElementById('posterContainer').classList.remove('hidden');
            document.getElementById('generatedPoster').classList.add('hidden');

            // 延迟渲染以确保图片和字体加载完毕
            setTimeout(() => {
                html2canvas(document.getElementById('posterContainer'), { 
                    useCORS: true, 
                    scale: 2,
                    backgroundColor: null 
                }).then(canvas => {
                    const imgData = canvas.toDataURL('image/png');
                    document.getElementById('generatedPoster').src = imgData;
                    document.getElementById('generatedPoster').classList.remove('hidden');
                    document.getElementById('posterContainer').classList.add('hidden'); // 隐藏DOM显示图片
                    document.getElementById('shareTip').innerText = '海报生成成功！长按上方图片保存，发送给好友';
                    document.getElementById('btnShareReward').classList.remove('hidden');
                }).catch(err => {
                    document.getElementById('shareTip').innerText = '海报渲染异常，您可以直接手机截屏分享';
                    document.getElementById('btnShareReward').classList.remove('hidden');
                });
            }, 800); 
        }

        function closeShareModal() {
            const modal = document.getElementById('shareModal');
            modal.classList.add('opacity-0');
            document.getElementById('shareModalContent').classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 500); 
        }

        async function claimShareReward() {
            try {
                const res = await fetch('/api/share', { method: 'POST', headers });
                const data = await res.json();
                if (data.success) {
                    if (data.rewarded) {
                        alert('分享成功！感谢推广，额外奖励您 1 次抽奖机会！');
                        document.getElementById('chances').innerText = data.chances;
                        // 激活抽奖按钮
                        const btn = document.getElementById('drawBtn');
                        if (data.chances > 0) {
                            btn.disabled = false;
                            btn.innerText = "开启我的幸运礼遇";
                        }
                    } else {
                        alert('感谢分享！\n(注：每个账号仅限领取1次分享奖励机会)');
                    }
                    closeShareModal();
                }
            } catch (err) { alert('网络异常，请重试'); }
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }
