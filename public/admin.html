<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOEY 诺一家具 - 后台中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #FAFAFA; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1A1A1A; }
        .nav-link { color: #999; padding-bottom: 12px; font-size: 14px; letter-spacing: 0.1em; transition: all 0.3s; border-bottom: 2px solid transparent; }
        .nav-link:hover { color: #1A1A1A; }
        .nav-link.active { color: #1A1A1A; font-weight: 600; border-bottom: 2px solid #1A1A1A; }
        .premium-card { background: white; border: 1px solid #EBEBEB; border-radius: 4px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); }
    </style>
</head>
<body class="min-h-screen">
    
    <!-- NOEY 高级独立导航条 -->
    <header class="bg-white border-b border-[#EBEBEB] sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 pt-6 flex justify-between items-end">
            <div>
                <h1 class="text-xl font-bold tracking-widest mb-6">NOEY MANAGEMENT</h1>
                <nav class="flex space-x-8">
                    <a href="admin.html" class="nav-link active">基础设置与资产</a>
                    <a href="customer-management.html" class="nav-link">客户跟进 CRM</a>
                    <a href="reward-records.html" class="nav-link">中奖流水库</a>
                </nav>
            </div>
            <button onclick="logout()" class="mb-6 text-xs text-gray-400 hover:text-black tracking-widest uppercase transition">退出系统 / Logout</button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-8">
        
        <!-- 全局页面与品牌设置 -->
        <div class="premium-card mb-8">
            <h2 class="text-sm font-bold mb-6 tracking-widest text-gray-800 uppercase">品牌营销与权限配置</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-2 space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 tracking-widest uppercase">大标题</label>
                            <input type="text" id="configTitle" class="w-full border-b border-gray-200 py-2 text-sm bg-transparent focus:outline-none focus:border-black transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 mb-1 tracking-widest uppercase">副标题</label>
                            <input type="text" id="configSubtitle" class="w-full border-b border-gray-200 py-2 text-sm bg-transparent focus:outline-none focus:border-black transition">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-400 mb-1 tracking-widest uppercase">收款话术</label>
                        <input type="text" id="configPaymentCopy" class="w-full border-b border-gray-200 py-2 text-sm bg-transparent focus:outline-none focus:border-black transition">
                    </div>
                    <div class="grid grid-cols-3 gap-4 bg-gray-50 p-4 rounded mt-4">
                        <div class="col-span-3"><label class="text-[10px] text-gray-500 uppercase tracking-widest">Logo 素材链接</label></div>
                        <input type="text" id="logoColorUrl" class="border border-gray-200 p-2 text-xs rounded" placeholder="彩色 Logo">
                        <input type="text" id="logoBlackUrl" class="border border-gray-200 p-2 text-xs rounded" placeholder="黑色 Logo">
                        <input type="text" id="logoWhiteUrl" class="border border-gray-200 p-2 text-xs rounded" placeholder="白色 Logo">
                        <input type="text" id="configQrCodeUrl" class="col-span-3 border border-gray-200 p-2 text-xs rounded" placeholder="收款码图片链接">
                    </div>
                    <div class="mt-6 text-right">
                        <button onclick="saveConfig()" class="bg-[#1A1A1A] text-white px-6 py-2 rounded text-xs tracking-widest hover:bg-[#8C6A4F] transition shadow">保存品牌配置</button>
                    </div>
                </div>

                <!-- 账号安全 -->
                <div class="border-l border-gray-100 pl-8">
                    <h3 class="text-xs font-bold text-gray-800 tracking-widest uppercase mb-4">系统安全</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1 tracking-widest uppercase">管理员账号</label>
                            <input type="text" id="adminPhoneInput" class="w-full border border-gray-200 p-2 text-sm rounded bg-gray-50">
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-400 mb-1 tracking-widest uppercase">修改密码</label>
                            <input type="text" id="adminPasswordInput" class="w-full border border-gray-200 p-2 text-sm rounded bg-gray-50" placeholder="留空则不修改">
                        </div>
                        <button onclick="saveAdminAccount()" class="w-full border border-[#1A1A1A] text-[#1A1A1A] px-4 py-2 rounded text-xs tracking-widest hover:bg-[#1A1A1A] hover:text-white transition">更新凭证</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- 简化版：用户库管理 -->
            <div class="premium-card flex flex-col h-[600px]">
                <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-100">
                    <div>
                        <h2 class="text-sm font-bold tracking-widest uppercase">用户资产库 (简化)</h2>
                        <p class="text-[10px] text-gray-400 mt-1">仅用于调整抽奖次数，客户详情请前往客户CRM</p>
                    </div>
                </div>
                <div id="usersList" class="flex-grow overflow-y-auto space-y-2 pr-2"></div>
                <div class="mt-6 pt-4 border-t border-gray-100 text-right">
                    <button onclick="saveUsers()" class="bg-[#1A1A1A] text-white px-6 py-2 rounded text-xs tracking-widest hover:bg-[#8C6A4F] transition">同步抽奖次数</button>
                </div>
            </div>

            <!-- 奖品陈列管理 -->
            <div class="premium-card flex flex-col h-[600px]">
                <div class="flex justify-between items-center mb-6 pb-4 border-b border-gray-100">
                    <h2 class="text-sm font-bold tracking-widest uppercase">高级奖品陈列配置</h2>
                    <button onclick="addPrize()" class="border border-gray-200 text-gray-600 text-xs px-3 py-1 rounded hover:bg-gray-50">新增奖品</button>
                </div>
                <div id="prizesList" class="flex-grow overflow-y-auto space-y-3 pr-2"></div>
                <div class="mt-6 pt-4 border-t border-gray-100 text-right">
                    <button onclick="savePrizes()" class="bg-[#1A1A1A] text-white px-6 py-2 rounded text-xs tracking-widest hover:bg-[#8C6A4F] transition">同步奖品池</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        const headers = { 'Authorization': token, 'Content-Type': 'application/json' };
        let currentData = { prizes: [], users: [] };

        async function init() {
            // 加载配置
            const cfgRes = await fetch('/api/config');
            const config = await cfgRes.json();
            document.getElementById('configTitle').value = config.title || '';
            document.getElementById('configSubtitle').value = config.subtitle || '';
            document.getElementById('configPaymentCopy').value = config.paymentCopy || '';
            document.getElementById('configQrCodeUrl').value = config.qrCodeUrl || '';
            document.getElementById('logoColorUrl').value = config.logoColorUrl || '';
            document.getElementById('logoBlackUrl').value = config.logoBlackUrl || '';
            document.getElementById('logoWhiteUrl').value = config.logoWhiteUrl || '';

            // 加载用户和奖品 (使用简化版的 API)
            const res = await fetch('/api/admin/users', { headers });
            if (res.status === 403) return logout();
            currentData = await res.json();
            
            if(currentData.admin) document.getElementById('adminPhoneInput').value = currentData.admin.phone;

            renderPrizes();
            renderUsers();
        }

        async function saveConfig() {
            const payload = {
                title: document.getElementById('configTitle').value, subtitle: document.getElementById('configSubtitle').value,
                paymentCopy: document.getElementById('configPaymentCopy').value, qrCodeUrl: document.getElementById('configQrCodeUrl').value,
                logoColorUrl: document.getElementById('logoColorUrl').value, logoBlackUrl: document.getElementById('logoBlackUrl').value, logoWhiteUrl: document.getElementById('logoWhiteUrl').value
            };
            await fetch('/api/config', { method: 'POST', headers, body: JSON.stringify(payload) });
            alert('品牌配置已保存');
        }

        function renderPrizes() {
            document.getElementById('prizesList').innerHTML = currentData.prizes.map((p, i) => `
                <div class="flex gap-3 items-center bg-[#FDFDFD] p-3 border border-gray-100 rounded">
                    <input type="text" value="${p.name}" onchange="currentData.prizes[${i}].name=this.value" class="flex-1 border-b border-gray-200 p-1 text-sm bg-transparent focus:border-black focus:outline-none" placeholder="奖品名称">
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-gray-400 tracking-widest">权重</span>
                        <input type="number" value="${p.weight}" onchange="currentData.prizes[${i}].weight=Number(this.value)" class="w-16 border-b border-gray-200 p-1 text-sm bg-transparent text-center focus:border-black focus:outline-none">
                    </div>
                    <button onclick="currentData.prizes.splice(${i}, 1); renderPrizes()" class="text-gray-400 hover:text-red-500 text-xs px-2 transition">删除</button>
                </div>
            `).join('');
        }
        function addPrize() { currentData.prizes.push({ name: "NEW GIFT - 新奖品", weight: 10 }); renderPrizes(); }
        async function savePrizes() { await fetch('/api/admin/prizes', { method: 'POST', headers, body: JSON.stringify(currentData.prizes) }); alert('奖品库已同步'); }

        function renderUsers() {
            document.getElementById('usersList').innerHTML = currentData.users.map((u, i) => `
                <div class="flex items-center justify-between p-3 border border-gray-100 rounded bg-white hover:border-gray-300 transition">
                    <div>
                        <div class="font-medium text-sm tracking-widest">${u.phone}</div>
                        <div class="text-[10px] text-gray-400 tracking-widest mt-1">注册: ${u.registerTime || '未知'}</div>
                    </div>
                    <div class="flex gap-4 items-center">
                        <div class="flex flex-col items-center">
                            <span class="text-[10px] text-gray-400 tracking-widest mb-1">机会</span>
                            <input type="number" value="${u.chances}" onchange="currentData.users[${i}].chances=Number(this.value)" class="w-12 border-b border-gray-300 text-sm text-center focus:outline-none bg-transparent">
                        </div>
                        <button onclick="resetUserRewards('${u.phone}')" class="text-[10px] text-red-400 hover:text-red-600 border border-red-100 px-2 py-1 rounded tracking-widest">重置奖品</button>
                    </div>
                </div>
            `).join('');
        }

        async function saveUsers() { await fetch('/api/admin/users', { method: 'POST', headers, body: JSON.stringify(currentData.users) }); alert('抽奖次数更新成功'); }

        async function resetUserRewards(phone) {
            if(!confirm(`确定要清空用户 ${phone} 的所有中奖记录吗？该操作不可逆，且同步删除独立中奖流水。`)) return;
            await fetch('/api/admin/reset-rewards', { method: 'POST', headers, body: JSON.stringify({ phone }) });
            alert('已重置');
        }

        async function saveAdminAccount() {
            const phone = document.getElementById('adminPhoneInput').value;
            const password = document.getElementById('adminPasswordInput').value;
            if(!phone) return;
            await fetch('/api/admin/account', { method: 'POST', headers, body: JSON.stringify({ phone, password }) });
            alert('系统安全凭证已更新');
            if(phone !== localStorage.getItem('token')) localStorage.setItem('token', phone);
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }
        init();
    </script>
</body>
</html>
