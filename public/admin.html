<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 p-8">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">系统管理控制台</h1>
            <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600">退出登录</button>
        </div>

        <!-- 全局页面设置 (修改了这里，增加规则管理) -->
        <div class="bg-white p-6 rounded-lg shadow-sm mb-8 border-l-4 border-blue-500">
            <h2 class="text-lg font-bold mb-4">品牌营销与规则配置</h2>
            <div class="flex gap-4 items-end mb-6">
                <div class="flex-1">
                    <label class="block text-sm text-gray-600 mb-1">活动大标题</label>
                    <input type="text" id="configTitle" class="w-full border p-2 rounded">
                </div>
                <div class="flex-1">
                    <label class="block text-sm text-gray-600 mb-1">活动副标题</label>
                    <input type="text" id="configSubtitle" class="w-full border p-2 rounded">
                </div>
            </div>

            <!-- 新增：收款弹窗配置 -->
            <div class="flex gap-4 items-end mb-6 bg-gray-50 p-4 rounded border border-gray-100">
                <div class="flex-2 w-2/3">
                    <label class="block text-sm text-gray-600 mb-1">收款弹窗话术</label>
                    <input type="text" id="configPaymentCopy" class="w-full border p-2 rounded" placeholder="例如：扫码支付后联系设计师录入次数">
                </div>
                <div class="flex-1 w-1/3">
                    <label class="block text-sm text-gray-600 mb-1">收款码图片网络链接 (URL)</label>
                    <input type="text" id="configQrCodeUrl" class="w-full border p-2 rounded" placeholder="以 http 开头的图片链接">
                </div>
            </div>
            
            <div class="mb-4">
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-sm text-gray-600">获取抽奖机会规则配置 (首页展示)</label>
                    <button onclick="addRule()" class="text-xs bg-gray-200 px-2 py-1 rounded">添加一条规则</button>
                </div>
                <div id="rulesList" class="space-y-2"></div>
            </div>

            <div class="text-right">
                <button onclick="saveConfig()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">保存营销配置</button>
            </div>
        </div>

        <!-- 奖品管理 -->
        <div class="bg-white p-6 rounded-lg shadow-sm mb-8">
            <div class="flex justify-between mb-4">
                <h2 class="text-lg font-bold">奖品与概率配置 (首页也会展示奖品)</h2>
                <button onclick="addPrize()" class="bg-black text-white px-4 py-1 rounded">新增奖品</button>
            </div>
            <div id="prizesList" class="space-y-3"></div>
            <button onclick="savePrizes()" class="mt-4 bg-[#8B7355] text-white px-6 py-2 rounded hover:bg-[#725e45]">保存奖品修改</button>
        </div>

        <!-- 用户管理 -->
        <div class="bg-white p-6 rounded-lg shadow-sm">
            <h2 class="text-lg font-bold mb-4">客户资产管理</h2>
            <div id="usersList" class="space-y-3"></div>
            <button onclick="saveUsers()" class="mt-4 bg-[#8B7355] text-white px-6 py-2 rounded hover:bg-[#725e45]">保存次数修改</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';
        const headers = { 'Authorization': token, 'Content-Type': 'application/json' };
        let currentData = { prizes: [], users: [] };
        let currentRules = [];

        async function init() {
            // 加载配置
            const cfgRes = await fetch('/api/config');
            const config = await cfgRes.json();
            document.getElementById('configTitle').value = config.title;
            document.getElementById('configSubtitle').value = config.subtitle;
            document.getElementById('configPaymentCopy').value = config.paymentCopy || "";
            document.getElementById('configQrCodeUrl').value = config.qrCodeUrl || "";
            currentRules = config.rules || [];
            renderRules();

            // 加载数据
            const res = await fetch('/api/admin/data', { headers });
            if (res.status === 403) {
                alert('越权访问，即将退出');
                return logout();
            }
            currentData = await res.json();
            renderPrizes();
            renderUsers();
        }

        function renderRules() {
            document.getElementById('rulesList').innerHTML = currentRules.map((r, i) => `
                <div class="flex gap-2 items-center bg-gray-50 p-2 rounded">
                    <input type="text" value="${r.condition}" onchange="currentRules[${i}].condition=this.value" class="flex-1 border p-1 text-sm" placeholder="条件，如：设计方案定金">
                    <input type="text" value="${r.value}" onchange="currentRules[${i}].value=this.value" class="flex-1 border p-1 text-sm" placeholder="金额，如：3000元">
                    <input type="text" value="${r.reward}" onchange="currentRules[${i}].reward=this.value" class="w-24 border p-1 text-sm" placeholder="奖励，如：1次">
                    <button onclick="currentRules.splice(${i}, 1); renderRules()" class="text-red-500 text-sm">删除</button>
                </div>
            `).join('');
        }
        function addRule() { currentRules.push({ condition: "新门槛", value: "0元", reward: "1次" }); renderRules(); }

        async function saveConfig() {
            const title = document.getElementById('configTitle').value;
            const subtitle = document.getElementById('configSubtitle').value;
            const paymentCopy = document.getElementById('configPaymentCopy').value;
            const qrCodeUrl = document.getElementById('configQrCodeUrl').value;
            
            await fetch('/api/config', { 
                method: 'POST', 
                headers, 
                body: JSON.stringify({ title, subtitle, paymentCopy, qrCodeUrl, rules: currentRules }) 
            });
            alert('品牌营销配置已保存！首页已实时更新。');
        }

        function renderPrizes() {
            document.getElementById('prizesList').innerHTML = currentData.prizes.map((p, i) => `
                <div class="flex gap-4 items-center bg-gray-50 p-3 rounded">
                    <input type="text" value="${p.name}" onchange="currentData.prizes[${i}].name=this.value" class="flex-1 border p-1" placeholder="奖品名称 (首页展示)">
                    <input type="number" value="${p.weight}" onchange="currentData.prizes[${i}].weight=Number(this.value)" class="w-24 border p-1" placeholder="权重">
                    <button onclick="currentData.prizes.splice(${i}, 1); renderPrizes()" class="text-red-500">删除</button>
                </div>
            `).join('');
        }

        function addPrize() { currentData.prizes.push({ name: "新奖品", weight: 10 }); renderPrizes(); }
        async function savePrizes() {
            await fetch('/api/admin/prizes', { method: 'POST', headers, body: JSON.stringify(currentData.prizes) });
            alert('奖品保存成功！');
        }

        function renderUsers() {
            document.getElementById('usersList').innerHTML = currentData.users.map((u, i) => `
                <div class="flex gap-4 items-center bg-gray-50 p-3 rounded justify-between">
                    <div class="font-bold w-32">${u.phone}</div>
                    <div class="flex items-center gap-2">
                        <span>剩余次数:</span>
                        <input type="number" value="${u.chances}" onchange="currentData.users[${i}].chances=Number(this.value)" class="w-16 border p-1 text-center">
                    </div>
                    <div class="text-sm text-gray-500 flex-1 truncate ml-4">记录: ${u.rewards.map(r=>r.name).join(', ') || '无'}</div>
                </div>
            `).join('');
        }

        async function saveUsers() {
            await fetch('/api/admin/users', { method: 'POST', headers, body: JSON.stringify(currentData.users) });
            alert('用户数据保存成功！');
        }

        function logout() { localStorage.removeItem('token'); window.location.href = '/login.html'; }
        
        init();
    </script>
</body>
</html>
